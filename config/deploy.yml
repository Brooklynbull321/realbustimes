# Name of your application. Used to uniquely configure containers.
service: realbustimes

# Name of the container image.
image: Brooklynbull321/realbustimes

# Deploy to these servers.
servers:
  web:
    hosts:
      - 188.245.178.97
      - ukbuses.org
    env:
      clear:
        WEB_CONCURRENCY: 12
        ALLOWED_HOSTS: "ukbuses.org"
        EMAIL_HOST: email-smtp.eu-west-1.amazonaws.com
        DISABLE_EDITING: ""
        DISABLE_REGISTRATION: False
      secret:
        - SECRET_KEY
        - DATABASE_URL
        - REDIS_URL
        - SENTRY_DSN
        - TURNSTILE_SECRET
        - EMAIL_HOST_USER
        - EMAIL_HOST_PASSWORD
        - TFL_APP_ID
        - TFL_APP_KEY
        - NTA_API_KEY
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY

builder:
  arch: amd64
  cache:
    type: registry
    options: mode=max

# Credentials for your image host.
registry:
  # Specify the registry server, if you're not using Docker Hub
  server: registry.digitalocean.com/hobsbawm
  # see https://github.com/settings/tokens
  username:
    - KAMAL_REGISTRY_PASSWORD
  password:
    - KAMAL_REGISTRY_PASSWORD

asset_path: /staticfiles

proxy:
  app_port: 8000
  healthcheck:
    path: /version
  buffering:
    responses: false
  logging:
    request_headers:
      - Referer
    response_headers: []
